services:
  # --- LIGHTWEIGHT STREAMING NODE (ORACLE FREE TIER) ---
  # This node ONLY handles the FFmpeg RTMP broadcast to YouTube.
  # It does not run heavy AI processing or database services.
  streamer:
    build: ./streamer
    container_name: vartapravah_stream_oracle
    restart: always
    env_file: .env
    volumes:
      - ./output:/app/videos
      - ./streamer/assets:/app/assets
    network_mode: bridge # Minimize network overhead
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Note: Postgres and Redis are REMOVED from Oracle node.
# They should only run on the Hetzner node to save resources.
