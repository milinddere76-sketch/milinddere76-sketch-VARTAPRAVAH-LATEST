services:
  # --- LIGHTWEIGHT STREAMING NODE ---
  streamer:
    build: ./streamer
    container_name: vartapravah_stream
    restart: always
    env_file: .env
    volumes:
      - ./output:/app/videos

  dashboard:
    build: ./app
    container_name: vartapravah_dashboard
    command: python3 -m uvicorn app.main:app --host 0.0.0.0 --port 80
    restart: always
    ports:
      - "8888:80"
    env_file: .env
    depends_on:
      - postgres
      - redis

  # Minimal infrastructure for streaming
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: vartapravah
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
