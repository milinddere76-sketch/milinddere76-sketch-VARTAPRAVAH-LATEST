services:
  # --- LIGHTWEIGHT STREAMING NODE (ORACLE FREE TIER) ---
  streamer:
    build:
      context: .
      dockerfile: Dockerfile.streamer
    container_name: vartapravah_stream_oracle
    restart: always
    env_file: .env
    volumes:
      - ./output:/app/videos
      - ./streamer/assets:/app/assets
    network_mode: bridge
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
