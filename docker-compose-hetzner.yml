services:
  # --- HEAVY AI & SCHEDULING NODE ---
  app:
    build: ./app
    container_name: vartapravah_app
    restart: always
    command: python3 -m uvicorn app.main:app --host 0.0.0.0 --port 8000
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - postgres
      - redis

  worker:
    build: ./app
    container_name: vartapravah_worker
    restart: always
    command: python3 workers/sadtalker_worker.py
    env_file: .env
    volumes:
      - ./output:/app/output
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
      - sadtalker

  video_worker:
    build: ./video_worker
    container_name: vartapravah_video
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: always
    volumes:
      - ./output:/app/output

  sadtalker:
    build: ./sadtalker
    container_name: vartapravah_sadtalker
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: always
    volumes:
      - ./output:/app/output

  # --- LOCAL INFRASTRUCTURE ---
  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: vartapravah
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
