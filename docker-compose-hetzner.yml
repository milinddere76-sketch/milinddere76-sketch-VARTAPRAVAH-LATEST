version: "3.9"

services:
  # --- CORE NEWS ENGINE ---
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: vp_app
    restart: always
    command: python3 -m uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./app/assets:/app/assets
      - ./output:/app/output
      - ./queue:/app/queue
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: vp_worker
    restart: always
    env_file:
      - .env
    volumes:
      - ./app/assets:/app/assets
      - ./output:/app/output
      - ./queue:/app/queue
      - ./ssh-key-2026-04-23.key:/app/oracle_key.key:ro
    depends_on:
      - app
      - redis

  frontend:
    build:
      context: ./frontend
    container_name: vp_frontend
    restart: always
    ports:
      - "3000:3000"

  # --- MINIMAL INFRASTRUCTURE ---
  postgres:
    image: postgres:15-alpine
    container_name: vp_db
    restart: always
    environment:
      POSTGRES_DB: vartapravah
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: vp_redis
    restart: always

volumes:
  postgres_data:

networks:
  default:
    name: vp_network
