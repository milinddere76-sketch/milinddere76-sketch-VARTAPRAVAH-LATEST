version: '3.8'

services:
  app:
    build: .
    container_name: vartapravah_app
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./videos:/app/videos
      - ./assets:/app/assets
      - ./temp:/app/temp
    env_file:
      - .env
    networks:
      - vartapravah_network
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  watchdog:
    image: docker:latest
    container_name: vartapravah_watchdog
    restart: always
    depends_on:
      - app
    networks:
      - vartapravah_network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: /bin/sh
    command: -c 'while true; do
      RUNNING=$$(docker ps --filter name=vartapravah_app --quiet);
      EXISTS=$$(docker ps -a --filter name=vartapravah_app --quiet);
      if [ -n "$$EXISTS" ] && [ -z "$$RUNNING" ]; then
        echo "[Watchdog] App not running, starting...";
        docker start vartapravah_app 2>&1 || true;
      fi;
      sleep 30;
      done'

networks:
  vartapravah_network:
    driver: bridge

volumes:
  videos:
  assets:
  temp: