version: '3.8'

services:
  app:
    build: .
    container_name: vartapravah_app
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./videos:/app/videos
      - ./assets:/app/assets
      - ./temp:/app/temp
    env_file:
      - .env
    networks:
      - vartapravah_network
    environment:
      - PYTHONUNBUFFERED=1

  streamer:
    image: jrottenberg/ffmpeg:6.0-alpine
    container_name: vartapravah_stream
    restart: always
    depends_on:
      - app
    volumes:
      - ./videos:/videos
    networks:
      - vartapravah_network
    environment:
      - YOUTUBE_STREAM_KEY=${YOUTUBE_STREAM_KEY}
    command: >
      -re -stream_loop -1 -i /videos/fallback.mp4
      -c:v libx264 -preset veryfast -b:v 3000k
      -c:a aac -b:a 128k -f flv 
      rtmp://a.rtmp.youtube.com/live2/${YOUTUBE_STREAM_KEY}
    healthcheck:
      test: ["CMD", "ps", "aux"]
      interval: 30s
      timeout: 10s
      retries: 3

  watchdog:
    image: alpine:latest
    container_name: vartapravah_watchdog
    restart: always
    depends_on:
      - app
    networks:
      - vartapravah_network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      sh -c "while true; do
        if ! docker ps | grep -q vartapravah_stream; then
          echo 'Stream service down, restarting...';
          docker restart vartapravah_stream;
        fi;
        if ! docker ps | grep -q vartapravah_app; then
          echo 'App service down, restarting...';
          docker restart vartapravah_app;
        fi;
        sleep 30;
      done"

networks:
  vartapravah_network:
    driver: bridge

volumes:
  videos:
  assets:
  temp: