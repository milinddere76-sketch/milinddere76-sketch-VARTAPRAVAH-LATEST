version: "3.9"

services:
  vartapravah:
    build: .
    container_name: vartapravah_ai
    command: ["python", "app/main.py", "tv"]
    
    # Environment variables
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    
    # Volume mounts
    volumes:
      - ./output:/app/output
      - ./assets:/app/assets
      - ./logs:/app/logs
    
    # Port mapping
    ports:
      - "8000:8000"
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Restart policy
    restart: always
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

