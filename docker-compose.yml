services:
  app:
    build: 
      context: .
      args:
        - REQS_FILE=requirements.txt
    container_name: vartapravah_app
    restart: always
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - postgres

  tts:
    build: ./tts
    container_name: vartapravah_tts
    restart: always

  video_worker:
    build: ./video_worker
    container_name: vartapravah_video
    restart: always
    volumes:
      - ./output:/app/output

  sadtalker:
    build: ./sadtalker
    container_name: vartapravah_sadtalker
    restart: always
    # GPU RESERVATION REMOVED FOR CPU TEST RUN
    volumes:
      - ./output:/app/output

  streamer:
    build: ./streamer
    container_name: vartapravah_stream
    restart: always
    env_file: .env

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: vartapravah
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
