version: '3.8'

services:
  app:
    build: .
    container_name: vartapravah_app
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./videos:/app/videos
      - ./assets:/app/assets
      - ./temp:/app/temp
    env_file:
      - .env
    networks:
      - vartapravah_network
    environment:
      - PYTHONUNBUFFERED=1

  streamer:
    image: jrottenberg/ffmpeg:6.0-alpine
    container_name: vartapravah_stream
    restart: always
    depends_on:
      - app
    volumes:
      - ./videos:/videos
    networks:
      - vartapravah_network
    environment:
      - YOUTUBE_STREAM_KEY=${YOUTUBE_STREAM_KEY}
    command: >
      -re -stream_loop -1 -i /videos/fallback.mp4
      -c:v libx264 -preset veryfast -b:v 3000k
      -c:a aac -b:a 128k -f flv 
      rtmp://a.rtmp.youtube.com/live2/${YOUTUBE_STREAM_KEY}
    healthcheck:
      test: ["CMD", "ps", "aux"]
      interval: 30s
      timeout: 10s
      retries: 3

  watchdog:
    image: docker:latest
    container_name: vartapravah_watchdog
    restart: always
    depends_on:
      - app
    networks:
      - vartapravah_network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      sh -c "while true; do
        STREAM_RUNNING=\$(docker ps --filter 'name=vartapravah_stream' --format '{{.ID}}' 2>/dev/null);
        APP_RUNNING=\$(docker ps --filter 'name=vartapravah_app' --format '{{.ID}}' 2>/dev/null);
        STREAM_EXISTS=\$(docker ps -a --filter 'name=vartapravah_stream' --format '{{.ID}}' 2>/dev/null);
        APP_EXISTS=\$(docker ps -a --filter 'name=vartapravah_app' --format '{{.ID}}' 2>/dev/null);
        
        if [ -z \"\$STREAM_RUNNING\" ] && [ -n \"\$STREAM_EXISTS\" ]; then
          echo '[Watchdog] Stream container exists but not running, attempting start...';
          docker start vartapravah_stream 2>&1 || echo '[Watchdog] Failed to start stream';
        fi;
        
        if [ -z \"\$APP_RUNNING\" ] && [ -n \"\$APP_EXISTS\" ]; then
          echo '[Watchdog] App container exists but not running, attempting start...';
          docker start vartapravah_app 2>&1 || echo '[Watchdog] Failed to start app';
        fi;
        
        echo \"[Watchdog] Health check - Stream: \${STREAM_RUNNING:-down}, App: \${APP_RUNNING:-down}\";
        sleep 30;
      done"

networks:
  vartapravah_network:
    driver: bridge

volumes:
  videos:
  assets:
  temp: