version: '3.8'

# Production Configuration with enhanced monitoring and resource limits

services:
  app:
    build: .
    container_name: vartapravah_app
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./videos:/app/videos
      - ./assets:/app/assets
      - ./temp:/app/temp
    env_file:
      - .env
    networks:
      - vartapravah_network
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  streamer:
    image: jrottenberg/ffmpeg:6.0-alpine
    container_name: vartapravah_stream
    restart: always
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - ./videos:/videos:ro
    networks:
      - vartapravah_network
    environment:
      - STREAM_KEY=${YOUTUBE_STREAM_KEY}
    command: >
      -re -stream_loop -1 -i /videos/fallback.mp4
      -c:v libx264 -preset veryfast -b:v 3000k
      -c:a aac -b:a 128k
      -f flv rtmp://a.rtmp.youtube.com/live2/${YOUTUBE_STREAM_KEY}
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M
    healthcheck:
      test: ["CMD", "ps", "aux"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  watchdog:
    image: alpine:latest
    container_name: vartapravah_watchdog
    restart: always
    depends_on:
      - app
      - streamer
    networks:
      - vartapravah_network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./logs:/logs
    environment:
      - CHECK_INTERVAL=30
    command: >
      sh -c "
      while true; do
        if ! docker ps | grep -q vartapravah_app; then
          echo '[ERROR] App service down at '$(date)' - Restarting...' >> /logs/watchdog.log;
          docker restart vartapravah_app;
          sleep 5;
        fi;
        if ! docker ps | grep -q vartapravah_stream; then
          echo '[ERROR] Stream service down at '$(date)' - Restarting...' >> /logs/watchdog.log;
          docker restart vartapravah_stream;
          sleep 5;
        fi;
        sleep 30;
      done
      "
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  vartapravah_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

volumes:
  videos:
  assets:
  temp: